apiVersion: apps/v1
kind: Deployment
metadata:
  name: jlaw-forensics
  namespace: default
  labels:
    app: jlaw-forensics
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: jlaw-forensics
  template:
    metadata:
      labels:
        app: jlaw-forensics
        version: v1.0.0
    spec:
      containers:
      - name: jlaw-forensics
        image: jlaw-forensics:1.0.0
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: jlaw-forensics
  namespace: default
spec:
  selector:
    app: jlaw-forensics
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jlaw-forensics-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jlaw-forensics
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

