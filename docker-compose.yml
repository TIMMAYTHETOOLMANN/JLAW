. I. version: '3.8'

services:
  jlaw-forensics:
    build:
      context: .
      dockerfile: Dockerfile
    image: jlaw-forensics:latest
    container_name: jlaw-forensics
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-LOCAL}
      - FORENSIC_S3_BUCKET=${FORENSIC_S3_BUCKET:-jlaw-forensic-evidence}
      - GOVINFO_API_KEY=${GOVINFO_API_KEY:-DEMO_KEY}
      - SEC_USER_AGENT=${SEC_USER_AGENT:-JLAW forensics@jlaw.com}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AZURE_STORAGE_CONNECTION=${AZURE_STORAGE_CONNECTION}
      - RETENTION_DAYS=${RETENTION_DAYS:-2555}
      - AUDIT_SIGNING_KEY=${AUDIT_SIGNING_KEY:-default_signing_key}
    volumes:
      - forensic-data:/var/forensic/worm
      - forensic-logs:/app/logs
      - forensic-models:/app/models
    networks:
      - forensic-network
    restart: unless-stopped
    command: ["verify"]
    healthcheck:
      test: ["CMD", "python", "-c", "from src.forensics import ForensicOrchestrator; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  jlaw-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: jlaw-forensics:latest
    container_name: jlaw-monitor
    environment:
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-LOCAL}
      - GOVINFO_API_KEY=${GOVINFO_API_KEY:-DEMO_KEY}
    volumes:
      - forensic-data:/var/forensic/worm
      - forensic-logs:/app/logs
    networks:
      - forensic-network
    restart: unless-stopped
    command: ["monitor"]
    depends_on:
      - jlaw-forensics

volumes:
  forensic-data:
    driver: local
  forensic-logs:
    driver: local
  forensic-models:
    driver: local

networks:
  forensic-network:
    driver: bridge

