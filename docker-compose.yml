version: '3.8'

services:
  jlaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: jlaw-forensics
    environment:
      - SEC_USER_AGENT=${SEC_USER_AGENT:-JLAW-Forensics/4.0 (forensics@jlaw-system.org)}
      - SEC_RATE_LIMIT=${SEC_RATE_LIMIT:-6.0}
      - SEC_CACHE_ENABLED=true
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-jlaw_secure_password}
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=jlaw
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-jlaw_secure_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RFC3161_TIMESTAMP_URL=https://freetsa.org/tsr
    depends_on:
      neo4j:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./evidence:/app/evidence
      - ./reports:/app/reports
      - jlaw_cache:/app/.jlaw_cache
    networks:
      - jlaw-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: jlaw-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-jlaw_secure_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - jlaw-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: jlaw-timescaledb
    environment:
      - POSTGRES_USER=jlaw
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-jlaw_secure_password}
      - POSTGRES_DB=jlaw_forensics
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - jlaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlaw -d jlaw_forensics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jlaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jlaw-network
    command: redis-server --appendonly yes
    restart: unless-stopped

networks:
  jlaw-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  timescale_data:
  redis_data:
  jlaw_cache:
