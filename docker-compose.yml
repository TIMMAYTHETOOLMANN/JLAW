version: '3.9'

services:
  # Backend API - MCP Forensics
  backend:
    build:
      context: ./mcp_forensics_backend
      dockerfile: Dockerfile
    container_name: mcp_forensics_backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ./mcp_forensics_backend:/app
      - forensic_data:/app/forensic_exports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - Static files served via nginx
  frontend:
    image: nginx:alpine
    container_name: mcp_forensics_frontend
    ports:
      - "3000:80"
    volumes:
      - ./mcp_forensics_frontend:/usr/share/nginx/html:ro
      - ./mcp_forensics_frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  # Redis for caching and state management (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: mcp_forensics_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  forensic_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: mcp_forensics_network
