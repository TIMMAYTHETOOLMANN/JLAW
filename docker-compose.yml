version: '3.8'

services:
  jlaw:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: jlaw-forensics
    environment:
      - SEC_USER_AGENT=${SEC_USER_AGENT:-JLAW-Forensics/4.0 (forensics@jlaw-system.org)}
      - SEC_RATE_LIMIT=${SEC_RATE_LIMIT:-6.0}
      - SEC_CACHE_ENABLED=true
      - POLYGON_API_KEY=${POLYGON_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-jlaw_secure_password}
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=jlaw
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-jlaw_secure_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RFC3161_TIMESTAMP_URL=https://freetsa.org/tsr
    depends_on:
      neo4j:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./evidence:/app/evidence
      - ./reports:/app/reports
      - jlaw_cache:/app/.jlaw_cache
    networks:
      - jlaw-network
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: jlaw-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-jlaw_secure_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - jlaw-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: jlaw-timescaledb
    environment:
      - POSTGRES_USER=jlaw
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-jlaw_secure_password}
      - POSTGRES_DB=jlaw_forensics
      - POSTGRES_INITDB_ARGS="-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./sql/timescaledb_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    command: 
      - "postgres"
      - "-c"
      - "shared_buffers=2GB"
      - "-c"
      - "effective_cache_size=6GB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "work_mem=32MB"
      - "-c"
      - "timescaledb.max_background_workers=8"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_workers=8"
    networks:
      - jlaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jlaw -d jlaw_forensics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jlaw-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jlaw-network
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass $$REDIS_PASSWORD --maxmemory 1gb --maxmemory-policy allkeys-lru;
      else
        redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru;
      fi"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

networks:
  jlaw-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  timescale_data:
  redis_data:
  jlaw_cache:
