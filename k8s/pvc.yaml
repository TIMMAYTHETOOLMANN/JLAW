apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jlaw-evidence-pvc
  namespace: jlaw-forensics
  labels:
    app: jlaw
    component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jlaw-reports-pvc
  namespace: jlaw-forensics
  labels:
    app: jlaw
    component: storage
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
