site_name: JLAW SEC Forensic Analysis System
site_description: DOJ-Grade 15-Node Recursive Prosecutorial Engine for SEC Filing Analysis
site_author: JLAW Development Team
repo_url: https://github.com/TIMMAYTHETOOLMANN/JLAW
repo_name: TIMMAYTHETOOLMANN/JLAW

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search
  - tags

nav:
  - Home: index.md
  - Quick Start: quickstart.md
  
  - Architecture:
    - System Overview: architecture/system_overview.md
    - 15-Node Pipeline: architecture/15_node_pipeline.md
    - Evidence Chain: architecture/evidence_chain.md
    - Orchestration Hierarchy: architecture/orchestration_hierarchy.md
  
  - Deployment:
    - Prerequisites: deployment/prerequisites.md
    - Configuration: deployment/configuration.md
    - Docker Deployment: deployment/docker_deployment.md
    - Troubleshooting: deployment/troubleshooting.md
  
  - User Guide:
    - CLI Reference: user_guide/cli_reference.md
    - Batch Processing: user_guide/batch_processing.md
    - Interpreting Results: user_guide/interpreting_results.md
  
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - V1 to V2 Migration: development/v1_to_v2_migration.md
  
  - API Reference:
    - Nodes: api/nodes.md
    - Detection Patterns: api/detection_patterns.md
    - Evidence Chain: api/evidence_chain.md
  
  - Technical Documentation:
    - Strict Mode Troubleshooting: STRICT_MODE_TROUBLESHOOTING.md
    - SEC API Setup: SEC_API_SETUP.md
    - Rate Limiting Implementation: RATE_LIMITING_IMPLEMENTATION.md
    - AI Cross-Validation: AI_CROSS_VALIDATION_IMPLEMENTATION.md
    - Migration (Linear to Master): MIGRATION_LINEAR_TO_MASTER.md
    - Migration (V2 to V3): MIGRATION_V2_TO_V3.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/TIMMAYTHETOOLMANN/JLAW
  version:
    provider: mike

copyright: Copyright &copy; 2024 JLAW Development Team
