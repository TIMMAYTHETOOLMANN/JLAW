name: JLAW Forensic CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Quick import smoke
        run: |
          python - << 'PY'
          import numpy, pandas, aiohttp
          print("NumPy:", numpy.__version__)
          print("Pandas:", pandas.__version__)
          PY

      - name: Verify multi-tier (best-effort)
        run: python verify_multi_tier_sec.py
        continue-on-error: true

      - name: Health snapshot (best-effort)
        run: python scripts/gen_health_snapshot.py
        continue-on-error: true

      - name: Targeted tests (skip if no GOVINFO key)
        env:
          GOVINFO_API_KEY: ''
        run: pytest -q test_single_filing.py

      - name: Artifact diff (best-effort)
        run: python scripts/diff_artifacts.py
        continue-on-error: true

      - name: Upload forensic_reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensic_reports
          path: forensic_reports
          if-no-files-found: ignore
