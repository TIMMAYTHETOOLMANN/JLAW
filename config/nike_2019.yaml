# JLAW Forensics Analysis Configuration
# Target: Nike Inc. 2019 SEC Filings
# ===============================================
# 
# This configuration analyzes all Nike Inc. SEC filings from calendar year 2019.
# Matches the benchmark gold standard analysis.
#

# =============================================================================
# TARGET COMPANY INFORMATION
# =============================================================================

company_name: "Nike Inc."
cik: "0000320187"
ticker: "NKE"

# =============================================================================
# ANALYSIS DATE RANGE
# =============================================================================

start_date: "2019-01-01"
end_date: "2019-12-31"
fiscal_year: 2019

# =============================================================================
# FILING TYPES TO ANALYZE
# =============================================================================
# 
# Comprehensive analysis of all relevant SEC filing types

filing_types:
  - "10-K"
  - "10-Q"
  - "8-K"
  - "4"
  - "SC 13G"
  - "SC 13G/A"

max_filings: null  # Analyze all filings

# =============================================================================
# ANALYSIS OPTIONS
# =============================================================================

enable_benfords: true
enable_contradiction: true
enable_temporal: true
enable_legal_correlation: true

# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================

output_format: "doj_level"
output_directory: "forensic_reports/nike_2019"
generate_evidence_packages: true
generate_summary_only: false

# =============================================================================
# DETECTION THRESHOLDS (Production Defaults)
# =============================================================================

late_filing_tolerance_days: 2
zero_dollar_threshold: 0.01

misstatement_keywords:
  - "restated"
  - "restate"
  - "restating"
  - "modified retrospective"
  - "restatement"
  - "revised"
  - "corrected"

# =============================================================================
# ADVANCED OPTIONS
# =============================================================================

parallel_processing: true
max_workers: 5
save_intermediate_results: true
