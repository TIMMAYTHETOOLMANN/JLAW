# ============================================
# DocsGPT Integration Configuration
# JARVIS NEXUS - SEC Forensic Analysis System
# ============================================

integration:
  enabled: true
  version: "1.0.0"
  docsgpt_path: "external_repos/DocsGPT"
  auto_initialize: true

# Document Parsing Configuration
parsing:
  # Enable specific parsers
  parsers:
    pdf:
      enabled: true
      use_vision_model: false  # Set to true for complex layouts
      ocr_enabled: true
      ocr_language: "eng"
      extract_tables: true
      extract_images: true
    
    html:
      enabled: true
      preserve_formatting: true
      extract_tables: true
      detect_sec_sections: true
    
    xml_xbrl:
      enabled: true
      extract_facts: true
      parse_calculations: true
      preserve_context: true
    
    tabular:
      enabled: true
      formats: ["csv", "xlsx"]
      header_detection: true
      multi_sheet: true
    
    office:
      enabled: true
      formats: ["docx", "pptx"]
      extract_metadata: true
    
    json:
      enabled: true
      preserve_structure: true
    
    image:
      enabled: true
      ocr_enabled: true
      min_confidence: 0.7

  # General parsing settings
  settings:
    batch_size: 10
    parallel_processing: true
    max_workers: 4
    timeout_seconds: 300
    retry_attempts: 3

# Document Chunking Configuration
chunking:
  strategy: "sec_optimized"  # Options: fixed, semantic, sec_optimized
  
  # Token limits
  max_tokens: 2000
  min_tokens: 150
  overlap_tokens: 100
  
  # SEC-specific settings
  sec_sections:
    preserve_boundaries: true  # Keep SEC sections intact
    section_priority:
      - "Item 1A"  # Risk Factors
      - "Item 7"   # MD&A
      - "Item 8"   # Financial Statements
      - "Item 1"   # Business
  
  # Advanced chunking
  semantic_chunking:
    enabled: true
    similarity_threshold: 0.75
  
  table_handling:
    keep_with_context: true
    max_table_tokens: 500

# Vector Store Configuration
vectorstore:
  # Primary store type: faiss, mongodb, elasticsearch, qdrant
  store_type: "faiss"
  
  # Storage paths
  index_path: "forensic_storage/vector_indices"
  metadata_path: "forensic_storage/vector_metadata"
  
  # FAISS Configuration
  faiss:
    index_type: "IVF"  # Options: Flat, IVF, HNSW
    nlist: 100  # Number of clusters for IVF
    nprobe: 10  # Number of clusters to search
    metric: "L2"  # Options: L2, IP (inner product)
    
  # MongoDB Configuration (if used)
  mongodb:
    uri: null  # Set in .env: MONGODB_URI
    database: "jlaw_forensics"
    collection: "sec_embeddings"
    vector_index_name: "vector_index"
  
  # Elasticsearch Configuration (if used)
  elasticsearch:
    url: null  # Set in .env: ELASTICSEARCH_URL
    index: "sec-filings"
    dimensions: 768

# Embedding Configuration
embeddings:
  # Model selection
  model_name: "sentence-transformers/all-mpnet-base-v2"
  model_type: "sentence_transformer"  # Options: sentence_transformer, openai, huggingface
  
  # Model parameters
  dimension: 768
  batch_size: 32
  normalize: true
  max_length: 512
  
  # Caching
  cache_embeddings: true
  cache_path: "forensic_storage/embedding_cache"
  
  # OpenAI embeddings (if used)
  openai:
    model: "text-embedding-3-large"
    dimension: 3072

# Semantic Search Configuration
search:
  # Search parameters
  default_top_k: 10
  max_top_k: 100
  similarity_threshold: 0.7
  
  # Search modes
  modes:
    semantic: true
    keyword: true
    hybrid: true  # Combine semantic + keyword
  
  # Cross-filing analysis
  cross_filing:
    enabled: true
    max_filings: 20
    time_window_years: 5
  
  # Contradiction detection
  contradiction:
    enabled: true
    similarity_threshold: 0.85
    temporal_window_quarters: 8
  
  # Query expansion
  query_expansion:
    enabled: true
    max_expansions: 3
    use_synonyms: true

# LLM Configuration for Analysis
llm:
  # Primary provider
  provider: "openai"  # Options: openai, anthropic, google, local
  
  # Model settings
  openai:
    model: "gpt-4o"
    temperature: 0.1
    max_tokens: 4096
    top_p: 1.0
  
  anthropic:
    model: "claude-3-5-sonnet-20241022"
    temperature: 0.1
    max_tokens: 4096
  
  google:
    model: "gemini-pro"
    temperature: 0.1
    max_tokens: 4096
  
  # Local model settings (Ollama)
  local:
    model: "llama3:8b"
    base_url: "http://localhost:11434"
  
  # Rate limiting
  rate_limit:
    requests_per_minute: 50
    tokens_per_minute: 90000

# Agent System Configuration
agents:
  # DocsGPT ReAct Agent
  react_agent:
    enabled: true
    max_iterations: 10
    allow_dangerous_code: false
  
  # SEC Forensic Tools
  tools:
    - name: "search_sec_filings"
      enabled: true
    - name: "analyze_fraud_indicators"
      enabled: true
    - name: "find_contradictions"
      enabled: true
    - name: "lookup_statute"
      enabled: true
    - name: "calculate_beneish_score"
      enabled: true
    - name: "extract_financial_metrics"
      enabled: true

# API Configuration (if REST API is deployed)
api:
  enabled: false  # Set to true to enable REST API
  host: "0.0.0.0"
  port: 5000
  debug: false
  
  # Authentication
  authentication:
    enabled: true
    type: "api_key"  # Options: api_key, jwt, oauth
  
  # Rate limiting
  rate_limiting:
    enabled: true
    requests_per_minute: 100
    burst: 20
  
  # CORS
  cors:
    enabled: true
    origins: ["*"]

# Forensic Evidence Configuration
evidence:
  # Immutable storage
  storage_backend: "filesystem"  # Options: filesystem, s3, azure
  storage_path: "forensic_storage/evidence"
  
  # Evidence chain
  enable_blockchain_hash: false
  enable_timestamping: true
  timestamp_authority: "rfc3161"
  
  # Integrity
  hash_algorithm: "sha256"
  verify_on_retrieval: true

# Performance Optimization
performance:
  # Caching
  cache:
    enabled: true
    type: "memory"  # Options: memory, redis, file
    ttl_seconds: 3600
  
  # Parallel processing
  parallel:
    enabled: true
    max_workers: 4
    use_async: true
  
  # Memory management
  memory:
    max_cache_size_mb: 1024
    gc_threshold: 0.8

# Logging Configuration
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "structured"  # Options: structured, json, plain
  
  # Output
  console: true
  file: true
  file_path: "logs/docsgpt_integration.log"
  
  # Forensic audit trail
  audit_trail: true
  audit_file: "forensic_storage/audit/integration_audit.log"

# Monitoring & Telemetry
monitoring:
  enabled: true
  
  # Metrics
  metrics:
    - "documents_parsed"
    - "chunks_created"
    - "embeddings_generated"
    - "searches_performed"
    - "contradictions_found"
  
  # Performance tracking
  track_performance: true
  performance_log: "logs/performance.json"

# Development Settings
development:
  debug_mode: false
  verbose_logging: false
  test_mode: false
  
  # Sample data
  use_sample_data: false
  sample_data_path: "tests/fixtures"

# Production Settings
production:
  # Deployment
  deployment_mode: "production"  # Options: development, production
  
  # Security
  security:
    enable_input_validation: true
    enable_output_sanitization: true
    max_file_size_mb: 100
  
  # Reliability
  reliability:
    enable_health_checks: true
    health_check_interval_seconds: 60
    enable_auto_recovery: true

