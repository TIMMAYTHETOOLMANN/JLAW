# ============================================
# UNIFIED FORENSIC ANALYSIS SYSTEM v4.0
# ============================================

unified_forensic:
  version: "4.0.0"
  
  # DocsGPT Integration
  docsgpt:
    enabled: true
    parser_factory: true
    sec_chunker: true
    chunking_strategy: "HYBRID"  # Options: FIXED, SEMANTIC, HYBRID
    chunk_size: 2000
    chunk_overlap: 100
    max_content_length: 100000  # Maximum content length for parsing
    
  # Agent Configuration
  agents:
    openai:
      enabled: true
      model: "gpt-4o"
      max_tokens: 4000
      tools:
        - fetch_sec_filing
        - parse_violations
        - extract_financial_data
    anthropic:
      enabled: true
      model: "claude-3-5-sonnet-20241022"
      max_tokens: 4000
      deep_reasoning: true
      multi_pass: 2
      
  # Financial Forensics
  financial_forensics:
    flow_analyzer:
      enabled: true
      circular_window_days: 30
      enrichment_window_days: 60
      coordination_window_days: 14
      zero_dollar_threshold: 0.01
    revenue_analyzer:
      enabled: true
      dso_spike_threshold: 0.3
      hockey_stick_threshold: 0.4
      cash_divergence_threshold: 0.25
      
  # Quantitative Forensics
  quantitative:
    enabled: true
    beneish_m_score: true
    altman_z_score: true
    benford_law: true
    
  # Linguistic Analysis
  linguistic:
    enabled: true
    hedging_detection: true
    obfuscation_metrics: true
    sentiment_analysis: true
    readability_scoring: true
    
  # Temporal Analysis
  temporal:
    enabled: true
    timeline_reconstruction: true
    filing_delay_detection: true
    anomaly_detection: true
    
  # Contradiction Detection
  contradiction:
    enabled: true
    semantic_similarity_threshold: 0.7
    contradiction_threshold: 0.3
    cross_document_analysis: true
    
  # ML Fraud Detection
  ml_fraud:
    enabled: true
    use_bert: false  # Requires GPU, set to false for CPU-only
    use_ensemble: true
    confidence_threshold: 0.75
    
  # Statutory Mapping
  statute_mapping:
    enabled: true
    use_govinfo_api: true
    real_time_enrichment: true
    cache_statutes: true
    
  # Dual-Agent Validation
  dual_agent:
    enabled: true
    agreement_threshold: 0.75
    conflict_resolution: "anthropic"  # Which agent wins on conflicts
    
  # Module Toggles (all enabled by default for v4.0)
  modules:
    quantitative_forensics: true
    linguistic_analysis: true
    contradiction_detection: true
    statute_mapping: true
    dual_agent_validation: true
    prosecution_path: true
    
  # Output Configuration
  output:
    format: "full"  # Options: full, summary (always use full for v4.0)
    evidence_hashing: true
    chain_of_custody: true
    generate_machine_readable: true
    generate_appendices: true
    
  # Evidence Chain
  evidence:
    hash_algorithm: "sha256"
    immutable_storage: false  # Set to true for production with cloud storage
    storage_provider: "LOCAL"  # Options: AWS, AZURE, LOCAL
    retention_days: 2555  # 7 years

  # API Configuration
  sec:
    rate_limit: 10  # Requests per second
    user_agent: "JLAW Forensic Analyzer contact@forensics.example.com"
    retry_attempts: 3
    timeout: 30
    
  # Performance
  performance:
    max_concurrent_filings: 5
    enable_caching: true
    cache_directory: ".cache"
