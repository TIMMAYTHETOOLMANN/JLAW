# JLAW Forensics Analysis Configuration
# Target: Apple Inc. 2023 SEC Filings
# ===============================================
# 
# This configuration demonstrates system portability by analyzing
# a different company than the Nike benchmark.
#

# =============================================================================
# TARGET COMPANY INFORMATION
# =============================================================================

company_name: "Apple Inc."
cik: "0000320193"
ticker: "AAPL"

# =============================================================================
# ANALYSIS DATE RANGE
# =============================================================================

start_date: "2023-01-01"
end_date: "2023-12-31"
fiscal_year: 2023

# =============================================================================
# FILING TYPES TO ANALYZE
# =============================================================================

filing_types:
  - "10-K"
  - "10-Q"
  - "8-K"
  - "4"

max_filings: null

# =============================================================================
# ANALYSIS OPTIONS
# =============================================================================

enable_benfords: true
enable_contradiction: true
enable_temporal: true
enable_legal_correlation: true

# =============================================================================
# OUTPUT CONFIGURATION
# =============================================================================

output_format: "doj_level"
output_directory: "forensic_reports/apple_2023"
generate_evidence_packages: true
generate_summary_only: false

# =============================================================================
# DETECTION THRESHOLDS (Production Defaults)
# =============================================================================

late_filing_tolerance_days: 2
zero_dollar_threshold: 0.01

# =============================================================================
# ADVANCED OPTIONS
# =============================================================================

parallel_processing: true
max_workers: 5
save_intermediate_results: true
