# Enhanced Forensic Analysis Configuration Template
# =================================================
# JARVIS NEXUS v3.0 - Prosecutorial-Grade Configuration

investigation:
  case_id: "ANALYSIS_001"
  company: "Company Name Here"
  cik: "0000000000"  # 10-digit CIK
  ticker: "TICK"
  fiscal_year: 2019
  start_date: "2019-01-01"
  end_date: "2019-12-31"
  
  # Investigation scope - Filing types to analyze
  filing_types:
    - "10-K"      # Annual report
    - "10-Q"      # Quarterly report
    - "8-K"       # Current report
    - "4"         # Insider trading (Form 4)
    - "3"         # Initial insider ownership
    - "5"         # Annual insider report
    - "SC 13G"    # Beneficial ownership (passive)
    - "SC 13G/A"  # Beneficial ownership amendment
    - "SC 13D"    # Beneficial ownership (active)
    - "DEF 14A"   # Proxy statement
    - "S-1"       # Registration statement
  
  # Analysis modules to enable (v3.0 NEXUS)
  modules:
    sec_edgar: true
    form4_insider: true
    statute_mapper: true
    fraud_detector: true
    temporal_reconciliation: true
    contradiction_detection: true
    dual_agent: true
    govinfo_enrichment: true
    dossier_generation: true
    immutable_storage: true

# SEC EDGAR API Configuration
sec_edgar:
  rate_limit_delay: 0.11  # 110ms between requests (9 req/sec, safe under 10/sec limit)
  cache_enabled: true
  cache_dir: "forensic_storage/sec_cache"
  user_agent: "JLAW-Forensics-NEXUS/3.0 (Enhanced Analysis; legal@jlaw-nexus.org)"
  max_retries: 3
  timeout_seconds: 30

# Forensic Analysis Settings
analysis:
  # Fraud Detection Thresholds
  fraud_detection:
    threshold: 0.5  # Probability threshold for flagging (0-1)
    ml_models:
      - beneish_m_score       # Earnings manipulation probability
      - altman_z_score        # Bankruptcy risk
      - piotroski_f_score     # Financial strength
      - benford_law           # First-digit anomaly detection
    confidence_threshold: 0.7  # AI agent confidence minimum
  
  # Temporal Analysis
  temporal_analysis:
    restatement_detection: true
    ratio_anomaly_detection: true
    reconciliation_tests: true
    period_comparison: true
    trend_analysis: true
  
  # Statute Mapping
  statute_mapping:
    jurisdictions:
      - federal
      - sec
      - cfr
      - criminal
    violation_severity_threshold: "MEDIUM"  # CRITICAL, HIGH, MEDIUM, LOW
    auto_statute_enrichment: true
  
  # Contradiction Detection
  contradiction_detection:
    semantic_analysis: true
    cross_filing_comparison: true
    timeline_reconstruction: true
    nlp_model: "all-mpnet-base-v2"  # Sentence transformer model
  
  # Materiality Thresholds
  materiality:
    quantitative_percentage: 0.05  # 5% of benchmark
    absolute_threshold: 100000     # $100K absolute
    accumulated_threshold: 0.03    # 3% accumulated
  
  # Insider Trading Analysis
  insider_analysis:
    late_filing_grace_days: 2  # SEC 2 business day rule
    zero_dollar_flag: true
    transaction_clustering: true
    pattern_detection: true

# Dual Agent Configuration (v3.0 ENHANCED)
dual_agent:
  enabled: true
  
  providers:
    openai:
      enabled: true
      model: "gpt-4"
      temperature: 0.1  # Low temperature for consistency
      max_tokens: 4000
      
    anthropic:
      enabled: true
      model: "claude-3-5-sonnet-20241022"
      temperature: 0.1
      max_tokens: 4000
  
  # Cross-validation settings
  validation:
    agreement_threshold: 0.75  # 75% agreement required
    merge_strategy: "union"    # union, intersection, weighted
    conflict_resolution: "highest_confidence"
    require_both_agents: true  # Fail if either unavailable
  
  # Analysis workflow
  workflow:
    primary_agent: "openai"       # Initial detection
    secondary_agent: "anthropic"  # Cross-validation
    tertiary_enrichment: "govinfo" # Statute enrichment

# GovInfo Enrichment (Real-time Legal Framework)
govinfo:
  enabled: true
  max_references_per_statute: 10
  include_caselaw: true
  include_regulations: true
  include_criminal_code: true
  collections:
    - USCODE  # United States Code
    - CFR     # Code of Federal Regulations
    - FR      # Federal Register
    - PLAW    # Public Laws
    - USCOURTS  # Court opinions
  
  # Rate limiting (36,000 req/hour = 10 req/sec)
  rate_limit:
    requests_per_second: 9
    burst_allowance: 20

# Evidence Storage (Immutable Chain of Custody)
evidence:
  storage_dir: "forensic_storage/evidence"
  immutable_storage: true
  chain_of_custody: true
  cryptographic_signing: true
  hash_algorithm: "SHA-256"
  timestamp_protocol: "RFC3161"
  
  # Backup configuration
  backup:
    enabled: true
    location: "forensic_storage/backups"
    retention_days: 365
    encryption: true

# Dossier Generation (FRE 702 Compliant)
dossier:
  enabled: true
  format: "json"  # json, pdf, markdown
  include_sections:
    - executive_summary
    - detailed_findings
    - evidentiary_exhibits
    - legal_framework
    - expert_qualifications
    - methodology
    - chain_of_custody
  
  # Expert witness requirements (FRCP 26(a)(2)(B))
  expert_disclosure:
    include_credentials: true
    include_compensation: true
    include_prior_testimony: true
    daubert_standard_compliance: true

# Reporting Configuration
reporting:
  output_dir: "forensic_reports"
  formats:
    - json
    - markdown
    - html
  
  # Report components
  include:
    - violation_summary
    - statute_references
    - compliance_trees
    - evidence_chains
    - prosecutorial_recommendations
    - criminal_referrals
  
  # Classification
  classification: "CONFIDENTIAL"
  distribution_list:
    - "SEC Enforcement Division"
    - "DOJ Criminal Division"
    - "Legal Counsel"

# Performance Optimization
performance:
  async_workers: 10
  batch_size: 50
  cache_results: true
  parallel_processing: true
  memory_limit_mb: 4096

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  file_rotation: true
  max_file_size_mb: 100
  backup_count: 5
  include_timestamps: true
  include_thread_info: true

